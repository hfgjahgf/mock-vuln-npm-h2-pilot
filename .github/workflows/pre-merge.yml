name: pre-merge canonical-lookup gate (v4 4-arm architecture matrix)

# H2 stage v4' pilot: 4-arm architecture matrix on n=15 tuples × 3 ecosystems
# Arms:
#   A1 nvd_direct              — independent detection (raw NVD data lookup)
#   A2 grype_native            — real scanner activity (Grype raw output)
#   A3 canonical_enrichment    — Grype-downstream post-processing (bounded by A2 coverage)
#   A4 canonical_direct        — independent detection (canonical snapshot lookup)
#
# Key deltas:
#   Δ_grype_aggregation      = A2 - A1  (scanner DB aggregation benefit)
#   Δ_traceability_only      = A3 - A2  (enrichment layer value = just sources labels)
#   Δ_architecture           = A4 - A3  (independent vs enrichment insertion architecture)
#   Δ_gap_recovery           = A4 - A2  (canonical direct closes scanner blind spots)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  scan-and-attribute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # -------- Install Grype --------
      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Capture Grype DB metadata
        run: |
          grype db update 2>&1 | tail -3 || true
          grype db status -o json > grype_db_metadata.json 2>/dev/null || \
            grype db status > grype_db_metadata.json 2>&1 || true
          cat grype_db_metadata.json | head -20

      # -------- Arm A2: grype_native (real scanner) --------
      # Scans all lockfiles: package-lock.json (npm), requirements.txt (pip), pom.xml (maven)
      - name: A2 grype_native — scan all lockfiles
        run: |
          grype dir:. --output json > grype_output_full.json 2>grype_stderr.log
          echo "=== grype stderr (info only) ==="
          head -20 grype_stderr.log
          echo "=== grype output summary ==="
          jq '.matches | length' grype_output_full.json 2>&1 | head || echo "jq failed, output may be malformed"
          jq '[.matches[] | .vulnerability.namespace] | group_by(.) | map({ns: .[0], count: length})' grype_output_full.json 2>&1 | head -20 || true

      # -------- Arm A3: canonical_enrichment (post-process Grype output) --------
      - name: A3 canonical_enrichment — normalize + labels
        run: |
          python .github/actions/canonical-lookup/canonical_lookup.py \
            --grype-input grype_output_full.json \
            --canonical-snapshot canonical_data/unified_canonical.json \
            --output arm_A3_canonical_enrichment.json
          echo "A3 matches: $(jq '.total' arm_A3_canonical_enrichment.json)"

      # -------- Arm A1: nvd_direct (independent detection from NVD raw) --------
      - name: A1 nvd_direct — independent NVD lookup
        run: |
          python .github/actions/canonical-lookup/direct_lookup.py \
            --mode nvd \
            --pilot-tuples tests/pilot_tuples.json \
            --nvd-dir nvd_data \
            --output arm_A1_nvd_direct.json
          echo "A1 matches: $(jq '.total' arm_A1_nvd_direct.json)"

      # -------- Arm A4: canonical_direct (independent detection from canonical) --------
      - name: A4 canonical_direct — independent canonical lookup
        run: |
          python .github/actions/canonical-lookup/direct_lookup.py \
            --mode canonical \
            --pilot-tuples tests/pilot_tuples.json \
            --canonical-snapshot canonical_data/unified_canonical.json \
            --output arm_A4_canonical_direct.json
          echo "A4 matches: $(jq '.total' arm_A4_canonical_direct.json)"

      # -------- Compute 4-arm attribution --------
      - name: Compute 4-arm attribution decomposition
        run: |
          python .github/scripts/compute_metrics.py \
            --a1_nvd_direct arm_A1_nvd_direct.json \
            --a2_grype_native grype_output_full.json \
            --a3_canonical_enrichment arm_A3_canonical_enrichment.json \
            --a4_canonical_direct arm_A4_canonical_direct.json \
            --gt tests/pilot_tuples.json \
            --canonical-snapshot canonical_data/unified_canonical.json \
            --output metrics_summary.json
          echo "=== SUMMARY ==="
          jq '{
            a1: .a1_nvd_direct | {cov: .coverage_hit, act: .actionability, trace: .traceability},
            a2: .a2_grype_native | {cov: .coverage_hit, act: .actionability, trace: .traceability},
            a3: .a3_canonical_enrichment | {cov: .coverage_hit, act: .actionability, trace: .traceability},
            a4: .a4_canonical_direct | {cov: .coverage_hit, act: .actionability, trace: .traceability},
            deltas: {
              grype_aggregation: .delta_grype_aggregation,
              traceability_only: .delta_traceability_only,
              architecture: .delta_architecture,
              gap_recovery: .delta_gap_recovery
            }
          }' metrics_summary.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 4arm-pilot-outputs-${{ github.run_id }}
          path: |
            grype_db_metadata.json
            grype_output_full.json
            arm_A1_nvd_direct.json
            arm_A3_canonical_enrichment.json
            arm_A4_canonical_direct.json
            metrics_summary.json
          retention-days: 30
